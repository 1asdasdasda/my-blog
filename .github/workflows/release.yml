name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-nextjs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: postgresql://mock:mock@localhost/mock

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 5

  build-docker:
    needs: build-nextjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t my-blog:latest .
          docker save -o my-blog.tar my-blog:latest
      
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: my-blog-docker
          path: my-blog.tar
          retention-days: 5

  release:
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: my-blog-docker
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: my-blog.tar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}